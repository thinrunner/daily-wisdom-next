<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative circle top-right -->
  <circle cx="420" cy="100" r="180" fill="rgba(255,255,255,0.06)"/>
  <!-- Card -->
  <rect x="64" y="140" width="384" height="232" rx="28" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Opening quote mark -->
  <text x="104" y="218" font-family="Georgia, serif" font-size="72" fill="rgba(255,255,255,0.2)">"</text>
  <!-- Divider line -->
  <rect x="216" y="228" width="80" height="1.5" rx="1" fill="rgba(255,255,255,0.3)"/>
  <!-- Star / sparkle -->
  <text x="247" y="310" font-family="Georgia, serif" font-size="28" fill="rgba(255,255,255,0.9)">✦</text>
  <!-- Bottom label -->
  <text x="256" y="356" font-family="Georgia, serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="4">МУДРОСТЬ</text>
</svg>
